version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elevator
      POSTGRES_USER: elevator
      POSTGRES_PASSWORD: elevator
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    ports:
      - "8002:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    command: ["php", "artisan", "simulation:run-loop", "--intervalMs=1000"]
    depends_on:
      - backend
      - redis

  websocket:
    build:
      context: .
      dockerfile: docker/websocket/Dockerfile
    working_dir: /app
    volumes:
      - ./websocket:/app
    command: ["npm", "run", "start"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WS_PORT: 8090
    ports:
      - "8090:8090"
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: ["npm", "run", "dev"]
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8082:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - websocket

volumes:
  postgres_data:
